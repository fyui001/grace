name: 'Lint'

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - run: corepack enable
      - run: yarn
      - name: ESLint
        run: yarn run lint
      - name: prettier
        run: yarn run prettier:check
